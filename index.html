<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ダム情報</title>

    <style>

        body {
            font-family: sans-serif;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            width: 220px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .value {
            font-size: 36px;
            font-weight: bold;
        }

        .unit {
            font-size: 18px;
        }

        .time {
            margin-top: 30px;
            color: gray;
        }

    </style>
</head>

<body>

    <h1>ダム観測情報</h1>

    <div class="container">

        <div class="card">
            <div class="title">貯水位</div>
            <div class="value">
                <span id="waterLevel">--</span>
                <span class="unit">m</span>
            </div>
        </div>

        <div class="card">
            <div class="title">流入量</div>
            <div class="value">
                <span id="inflow">--</span>
                <span class="unit">m³/s</span>
            </div>
        </div>

        <div class="card">
            <div class="title">放流量</div>
            <div class="value">
                <span id="outflow">--</span>
                <span class="unit">m³/s</span>
            </div>
        </div>

    </div>

    <div class="time">
        観測時刻：
        <span id="obsTime">--</span>
    </div>

    <script>

        async function loadDamData() {

            const url =
                "https://kasen-pref-ibaraki.jp/Sta/GetDamStaData?&obsStaId=476&20260427020106";

            try {

                const response = await fetch(url);

                const json = await response.json();

                const items =
                    json.tableData.itemDataList;

                for (const item of items) {

                    const latest =
                        item.dataList[item.dataList.length - 1];

                    if (item.dispName === "貯水位") {

                        document.getElementById("waterLevel")
                            .innerText = latest.data;

                    }

                    if (item.dispName === "流入量") {

                        document.getElementById("inflow")
                            .innerText = latest.data;

                    }

                    if (item.dispName === "放流量") {

                        document.getElementById("outflow")
                            .innerText = latest.data;

                    }
                }

                document.getElementById("obsTime")
                    .innerText =
                    json.tableData.obsTime;

            } catch (error) {

                console.error(error);

                alert("データ取得失敗");

            }
        }

        loadDamData();

    </script>

</body>

</html>
